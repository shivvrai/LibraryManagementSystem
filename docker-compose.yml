version: '3.9'

services:
  # ── Elasticsearch ────────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: library_elasticsearch
    environment:
      - discovery.type=single-node        # single-node dev cluster
      - xpack.security.enabled=false      # no TLS/auth for local dev
      - ES_JAVA_OPTS=-Xms512m -Xmx512m   # limit heap for dev machine
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - backend-data:/data
    environment:
      - DATABASE_URL=sqlite:////data/library.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - LOG_LEVEL=INFO
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
  es_data:

